<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos — TecnoStore Almacén</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <div class="main">
        <header class="topbar">
            <span class="topbar-title">Gestión de Productos</span>
            <div class="topbar-actions">
                <button class="btn btn-primary btn-sm" onclick="openNewProduct()">
                    + Nuevo producto
                </button>
            </div>
        </header>

        <div class="content">
            <div id="alert-container"></div>

            <div class="card">
                <div class="card-header">
                    <h2>Inventario</h2>

                    <div class="search-bar" style="margin:0;">
                        <input type="text" id="search-input" class="form-control"
                            placeholder="Buscar..." style="width:280px;"
                            oninput="debouncedSearch()">

                        <select id="cat-filter" class="form-control"
                            style="width:160px;" onchange="loadProducts()">
                            <option value="">Todas las categorías</option>
                            <option value="portatiles">Portátiles</option>
                            <option value="componentes">Componentes</option>
                            <option value="monitores">Monitores</option>
                            <option value="perifericos">Periféricos</option>
                            <option value="almacenamiento">Almacenamiento</option>
                            <option value="redes">Redes</option>
                        </select>
                    </div>
                </div>

                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>SKU</th>
                            <th>Nombre</th>
                            <th>Categoría</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Actualizado</th>
                            <th>Acciones</th>
                        </tr>
                        </thead>

                        <tbody id="products-table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

    <script src="/js/app.js"></script>

    <script>
        if (!requireAuth()) throw new Error();
        document.getElementById('sidebar').innerHTML = renderSidebar('products');

        let searchTimeout;

        /* =========================
        SECURITY HELPERS
        ========================= */

        function escapeHtml(str) {
            if (typeof str !== 'string') return '';
            return str
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function sanitizeText(str) {
            return (str || '').toString().trim().replace(/[<>]/g, '');
        }

        /* =========================
        SEARCH DEBOUNCE
        ========================= */

        function debouncedSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(loadProducts, 350);
        }

        /* =========================
        LOAD PRODUCTS
        ========================= */

        async function loadProducts() {
            const search = sanitizeText(document.getElementById('search-input').value);
            const category = document.getElementById('cat-filter').value;

            let qs = '';
            if (search) qs += `?search=${encodeURIComponent(search)}`;
            if (category) qs += (qs ? '&' : '?') + `category=${encodeURIComponent(category)}`;

            const r = await apiFetch('/products' + qs);
            const tbody = document.getElementById('products-table');

            if (!r.ok) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:red;">Error cargando datos</td></tr>`;
                return;
            }

            const products = r.data;

            if (!products.length) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;">Sin productos</td></tr>`;
                return;
            }

            tbody.innerHTML = '';

            for (const p of products) {
                const tr = document.createElement('tr');

                tr.innerHTML = `
                    <td><code>${escapeHtml(p.sku)}</code></td>
                    <td class="fw-bold">${escapeHtml(p.name)}</td>
                    <td><span class="badge">${escapeHtml(p.category || '—')}</span></td>
                    <td>${formatPrice(p.price)}</td>
                    <td>${p.stock}</td>
                    <td>${formatDate(p.updated_at)}</td>
                    <td></td>
                `;

                const actions = document.createElement('div');
                actions.className = 'd-flex gap-2';

                const btnEdit = document.createElement('button');
                btnEdit.className = 'btn btn-ghost btn-sm';
                btnEdit.textContent = 'Editar';
                btnEdit.onclick = () => editProduct(p.id);

                const btnStock = document.createElement('button');
                btnStock.className = 'btn btn-ghost btn-sm';
                btnStock.textContent = 'Stock';
                btnStock.onclick = () => openStockModal(p.id, p.name);

                const btnDelete = document.createElement('button');
                btnDelete.className = 'btn btn-danger btn-sm';
                btnDelete.textContent = 'Eliminar';
                btnDelete.onclick = () => deleteProduct(p.id);

                actions.appendChild(btnEdit);
                actions.appendChild(btnStock);
                actions.appendChild(btnDelete);

                tr.children[6].appendChild(actions);
                tbody.appendChild(tr);
            }
        }

        /* =========================
        CREATE / EDIT PRODUCT
        ========================= */

        function openNewProduct() {
            document.getElementById('prod-id').value = '';
            document.getElementById('prod-sku').value = '';
            document.getElementById('prod-name').value = '';
            document.getElementById('prod-description').value = '';
            document.getElementById('prod-price').value = '';
            document.getElementById('prod-stock').value = '';
            document.getElementById('prod-category').value = '';

            openModal('modal-product');
        }

        async function saveProduct() {
            const id = document.getElementById('prod-id').value;

            const body = {
                sku: sanitizeText(document.getElementById('prod-sku').value),
                name: sanitizeText(document.getElementById('prod-name').value),
                description: sanitizeText(document.getElementById('prod-description').value),
                price: Math.max(0, parseFloat(document.getElementById('prod-price').value) || 0),
                stock: Math.max(0, parseInt(document.getElementById('prod-stock').value) || 0),
                category: sanitizeText(document.getElementById('prod-category').value),
            };

            if (!body.sku || !body.name) {
                return showAlert('alert-container', 'SKU y nombre son obligatorios.');
            }

            const r = id
                ? await apiFetch('/products/' + id, { method: 'PUT', body: JSON.stringify(body) })
                : await apiFetch('/products', { method: 'POST', body: JSON.stringify(body) });

            if (!r.ok) {
                return showAlert('alert-container', 'Error al guardar producto.');
            }

            closeModal('modal-product');
            showAlert('alert-container', 'Producto guardado.', 'success');
            loadProducts();
        }

        /* =========================
        DELETE PRODUCT (SAFE)
        ========================= */

        async function deleteProduct(id) {
            const first = confirm('¿Eliminar producto?');
            if (!first) return;

            const second = confirm('Esta acción no se puede deshacer.');
            if (!second) return;

            const r = await apiFetch('/products/' + id, { method: 'DELETE' });

            if (!r.ok) {
                return showAlert('alert-container', 'Error al eliminar.');
            }

            showAlert('alert-container', 'Producto eliminado.', 'success');
            loadProducts();
        }

        /* =========================
        STOCK
        ========================= */

        function openStockModal(id, name) {
            document.getElementById('stock-product-id').value = id;
            document.getElementById('stock-product-name').textContent = sanitizeText(name);
            document.getElementById('stock-qty').value = '';
            document.getElementById('stock-reason').value = '';
            openModal('modal-stock');
        }

        async function saveStock() {
            const id = document.getElementById('stock-product-id').value;
            const qty = parseInt(document.getElementById('stock-qty').value);
            const reason = sanitizeText(document.getElementById('stock-reason').value);

            if (isNaN(qty)) {
                return showAlert('alert-container', 'Cantidad inválida.');
            }

            const r = await apiFetch(`/products/${id}/stock`, {
                method: 'PATCH',
                body: JSON.stringify({ quantity: qty, reason })
            });

            if (!r.ok) {
                return showAlert('alert-container', 'Error al actualizar stock.');
            }

            closeModal('modal-stock');
            showAlert('alert-container', 'Stock actualizado.', 'success');
            loadProducts();
        }

        loadProducts();
        </script>
    </body>
</html>
