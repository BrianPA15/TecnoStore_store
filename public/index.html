<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoStore — Almacén</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="login-page">
    <div class="login-box">

        <div class="login-logo">
            <h1>📦 TecnoStore Almacén</h1>
            <p>Sistema de gestión de inventario</p>
        </div>

        <div id="alert-container"></div>

        <!-- LOGIN -->
        <div id="form-login">
            <div class="form-group">
                <label class="form-label">Correo electrónico</label>
                <input type="text" id="username" class="form-control"
                    placeholder="correo@tecnostore.local"
                    autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input type="password" id="password" class="form-control"
                    placeholder="Introduce tu contraseña"
                    autocomplete="current-password">
            </div>

            <button class="btn btn-primary w-100"
                onclick="doLogin()"
                style="margin-top:8px;">
                Iniciar sesión
            </button>

            <p style="text-align:center;margin-top:16px;">
                <a href="#" onclick="showForgot(); return false;"
                   style="font-size:12px;color:var(--text-muted);">
                    ¿Olvidaste tu contraseña?
                </a>
            </p>
        </div>

        <!-- FORGOT -->
        <div id="form-forgot" style="display:none;">
            <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">
                Introduce tu correo electrónico y te enviaremos un enlace de recuperación.
            </p>

            <div class="form-group">
                <label class="form-label">Correo electrónico</label>
                <input type="email" id="forgot-email" class="form-control"
                    placeholder="correo@tecnostore.local">
            </div>

            <button class="btn btn-primary w-100" onclick="doForgot()">
                Enviar enlace
            </button>

            <p style="text-align:center;margin-top:16px;">
                <a href="#" onclick="showLogin(); return false;"
                   style="font-size:12px;color:var(--text-muted);">
                    ← Volver al login
                </a>
            </p>
        </div>

        <!-- RESET -->
        <div id="form-reset" style="display:none;">
            <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">
                Introduce tu nueva contraseña.
            </p>

            <div class="form-group">
                <label class="form-label">Nueva contraseña</label>
                <input type="password" id="new-password" class="form-control"
                    placeholder="Nueva contraseña">
            </div>

            <button class="btn btn-primary w-100" onclick="doReset()">
                Cambiar contraseña
            </button>
        </div>
    </div>
</div>

<script src="/js/app.js"></script>

<script>
    // =========================
    // CONFIG SEGURA FRONTEND
    // =========================
    const TOKEN_KEY = 'wh_token';
    const USER_KEY = 'wh_user';

    function isTokenValid(token) {
        // mínima validación (evita falsos positivos vacíos)
        return token && token.length > 10;
    }

    function getToken() {
        return localStorage.getItem(TOKEN_KEY);
    }

    // Redirección segura
    if (isTokenValid(getToken())) {
        window.location.href = '/dashboard.html';
    }

    // Token reset desde URL
    const urlToken = new URLSearchParams(window.location.search).get('token');

    if (urlToken) {
        document.getElementById('form-login').style.display = 'none';
        document.getElementById('form-reset').style.display = 'block';
    }

    // =========================
    // LOGIN
    // =========================
    async function doLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
            return showAlert('alert-container', 'Introduce usuario y contraseña.');
        }

        // pequeña mejora: evitar passwords absurdamente cortas
        if (password.length < 6) {
            return showAlert('alert-container', 'Credenciales inválidas.');
        }

        const r = await apiFetch('/auth/login', {
            method: 'POST',
            body: JSON.stringify({ username, password })
        });

        // mensaje genérico (evita enumeración)
        if (!r.ok) {
            return showAlert('alert-container', 'Credenciales incorrectas.');
        }

        // ⚠️ sigue siendo localStorage (limitación del proyecto)
        localStorage.setItem(TOKEN_KEY, r.data.token);
        localStorage.setItem(USER_KEY, JSON.stringify(r.data.user));

        window.location.href = '/dashboard.html';
    }

    // =========================
    // FORGOT PASSWORD
    // =========================
    async function doForgot() {
        const email = document.getElementById('forgot-email').value.trim();

        if (!email) {
            return showAlert('alert-container', 'Introduce tu correo electrónico.');
        }

        const r = await apiFetch('/auth/forgot-password', {
            method: 'POST',
            body: JSON.stringify({ email })
        });

        // siempre mensaje genérico (evita user enumeration)
        showAlert(
            'alert-container',
            'Si el correo existe, recibirás instrucciones.',
            'success'
        );
    }

    // =========================
    // RESET PASSWORD
    // =========================
    async function doReset() {
        const password = document.getElementById('new-password').value;

        if (!password || password.length < 6) {
            return showAlert('alert-container', 'Contraseña demasiado corta.');
        }

        const r = await apiFetch('/auth/reset-password', {
            method: 'POST',
            body: JSON.stringify({
                token: urlToken,
                password
            })
        });

        if (!r.ok) {
            return showAlert('alert-container', 'No se pudo cambiar la contraseña.');
        }

        showAlert('alert-container', 'Contraseña cambiada. Redirigiendo...', 'success');

        setTimeout(() => {
            window.location.href = '/';
        }, 2000);
    }

    function showForgot() {
        document.getElementById('form-login').style.display = 'none';
        document.getElementById('form-forgot').style.display = 'block';
        document.getElementById('alert-container').innerHTML = '';
    }

    function showLogin() {
        document.getElementById('form-forgot').style.display = 'none';
        document.getElementById('form-login').style.display = 'block';
        document.getElementById('alert-container').innerHTML = '';
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') doLogin();
    });
</script>
</body>
</html>
