name: CI API Almacen e Integraciones

on: [push, pull_request]

jobs:
  node-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '14.x' # Versión mínima del README
    - name: Install Dependencies
      run: |
        cd app_almacen
        npm install
    - name: Run Jest API Tests
      env:
        PORT: 3000
        # Reemplaza la clave por defecto por tu secreto de GitHub
        JWT_SECRET: ${{ secrets.JWT_SECRET }} 
        DB_PATH: ./database.sqlite
        DOLAPIKEY: ${{ secrets.DOLAPIKEY }}
      run: |
        cd app_almacen
        npm run test --if-present